services:
  - type: web
    name: schedule-api
    runtime: node
    repo: https://github.com/Chraslan/schedule
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CACHE_TTL
        value: 60000
      - key: UPDATE_INTERVAL
        value: 60000
      - key: API_BASE_URL
        value: https://cloud.urbe.edu/web/v1/core/labComp/rotafolio
